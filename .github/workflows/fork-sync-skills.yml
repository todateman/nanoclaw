name: Sync upstream & merge-forward skill branches

on:
  # Triggered by upstream repo via repository_dispatch
  repository_dispatch:
    types: [upstream-main-updated]
  # Fallback: run on a schedule in case dispatch isn't configured
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  # Also run when fork's main is pushed directly
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: fork-sync
  cancel-in-progress: true

jobs:
  sync-and-merge:
    if: github.repository != 'qwibitai/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream main
        id: sync
        run: |
          # Add upstream remote
          git remote add upstream https://github.com/qwibitai/nanoclaw.git
          git fetch upstream main

          # Check if upstream has new commits
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream main."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Merge upstream main into fork's main
          if ! git merge upstream/main --no-edit; then
            echo "Merge had conflicts, attempting auto-resolution..."

            # Auto-resolve .env.example: take upstream's version
            if git status --short | grep -qE '^(UU|AA|DD) \.env\.example'; then
              git checkout --theirs .env.example
              git add .env.example
              echo "Auto-resolved: .env.example"
            fi

            # Auto-resolve repo-tokens/badge.svg: take upstream's version
            if git status --short | grep -qE '^(UU|AA|DD) repo-tokens/badge\.svg'; then
              git checkout --theirs repo-tokens/badge.svg
              git add repo-tokens/badge.svg
              echo "Auto-resolved: repo-tokens/badge.svg"
            fi

            # Auto-resolve package.json: merge fork's unique additions into upstream's version
            if git status --short | grep -qE '^UU package\.json'; then
              git show :1:package.json > /tmp/pkg_base.json
              git show :2:package.json > /tmp/pkg_ours.json
              git show :3:package.json > /tmp/pkg_theirs.json
              jq -s '
                .[0] as $base | .[1] as $ours | .[2] as $theirs |
                ($ours.dependencies // {} | to_entries | map(select(.key as $k | ($base.dependencies // {})[$k] == null)) | from_entries) as $added_deps |
                ($ours.devDependencies // {} | to_entries | map(select(.key as $k | ($base.devDependencies // {})[$k] == null)) | from_entries) as $added_dev_deps |
                $theirs |
                .dependencies = (($theirs.dependencies // {}) + $added_deps) |
                .devDependencies = (($theirs.devDependencies // {}) + $added_dev_deps)
              ' /tmp/pkg_base.json /tmp/pkg_ours.json /tmp/pkg_theirs.json > package.json
              git add package.json
              echo "Auto-resolved: package.json (merged fork additions into upstream)"
            fi

            # Auto-resolve package-lock.json: regenerate from merged package.json
            if git status --short | grep -qE '^UU package-lock\.json'; then
              rm -f package-lock.json
              npm install --package-lock-only --ignore-scripts --no-audit
              git add package-lock.json
              echo "Auto-resolved: package-lock.json (regenerated)"
            fi

            # Check if any conflicts remain
            if git status --short | grep -qE '^(UU|AA|DD) '; then
              echo "::error::Failed to merge upstream/main into fork main — unresolved conflicts remain:"
              git status --short | grep -E '^(UU|AA|DD) '
              git merge --abort
              echo "synced=false" >> "$GITHUB_OUTPUT"
              echo "sync_failed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git merge --continue --no-edit
            echo "All conflicts auto-resolved, merge completed."
          fi

          # Validate build
          npm ci
          if ! npm run build; then
            echo "::error::Build failed after merging upstream/main"
            git reset --hard "origin/main"
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! npm test 2>/dev/null; then
            echo "::error::Tests failed after merging upstream/main"
            git reset --hard "origin/main"
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin main
          echo "synced=true" >> "$GITHUB_OUTPUT"

      - name: Merge main into skill branches
        id: merge
        run: |
          # Re-fetch to pick up any changes pushed since job start
          git fetch origin

          FAILED=""
          SUCCEEDED=""

          # List all remote skill branches
          SKILL_BRANCHES=$(git branch -r --list 'origin/skill/*' | sed 's|origin/||' | xargs)

          if [ -z "$SKILL_BRANCHES" ]; then
            echo "No skill branches found."
            exit 0
          fi

          for BRANCH in $SKILL_BRANCHES; do
            SKILL_NAME=$(echo "$BRANCH" | sed 's|skill/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            git checkout -B "$BRANCH" "origin/$BRANCH"

            if ! git merge main --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git merge --abort
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            # Check if there's anything new to push
            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with main."
              SUCCEEDED="$SUCCEEDED $SKILL_NAME"
              continue
            fi

            npm ci

            if ! npm run build; then
              echo "::warning::Build failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            if ! npm test 2>/dev/null; then
              echo "::warning::Tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $SKILL_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Open issue for upstream sync failure
        if: steps.sync.outputs.sync_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'The automated sync with `qwibitai/nanoclaw` main failed.',
              '',
              'This usually means upstream made changes that conflict with this fork\'s channel code.',
              '',
              'To resolve manually:',
              '```bash',
              'git fetch upstream main',
              'git merge upstream/main',
              '# resolve conflicts',
              'npm run build && npm test',
              'git push',
              '```',
            ].join('\n');
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Upstream sync failed — merge conflict or build failure`,
                body,
                labels: ['upstream-sync']
              });
            } catch (e) {
              core.warning(`Could not create issue (issues may be disabled): ${e.message}`);
              await core.summary
                .addHeading('⚠️ Upstream sync failed')
                .addRaw(body)
                .write();
            }

      - name: Open issue for failed skill merges
        if: steps.merge.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.merge.outputs.failed }}'.trim().split(/\s+/);
            const body = [
              `The merge-forward workflow failed to merge \`main\` into the following skill branches:`,
              '',
              ...failed.map(s => `- \`skill/${s}\`: merge conflict, build failure, or test failure`),
              '',
              'Please resolve manually:',
              '```bash',
              ...failed.map(s => [
                `git checkout skill/${s}`,
                `git merge main`,
                `# resolve conflicts, then: git push`,
                ''
              ]).flat(),
              '```',
            ].join('\n');

            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Merge-forward failed for ${failed.length} skill branch(es)`,
                body,
                labels: ['skill-maintenance']
              });
            } catch (e) {
              core.warning(`Could not create issue (issues may be disabled): ${e.message}`);
              await core.summary
                .addHeading('⚠️ Skill merge-forward failed')
                .addRaw(body)
                .write();
            }
